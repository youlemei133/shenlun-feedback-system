<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户注册 - 申论判官</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #e07040;
            --primary-light: #ff9966;
            --primary-dark: #c55a30;
            --bg-warm: #fff8f3;
            --text-main: #5a3d2b;
            --text-sub: #8b6b5c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #fff9f5 0%, #fff0e8 50%, #ffe8dc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-sub);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            background: var(--bg-warm);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(224,112,64,0.35);
            margin-top: 10px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .judge-mini {
            position: relative;
            width: 60px;
            height: 70px;
            margin: 0 auto 15px;
        }

        .judge-hat {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 16px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border-radius: 18px 18px 3px 3px;
        }

        .judge-hat::before, .judge-hat::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 10px;
            height: 3px;
            background: #1a1a1a;
            transform: translateY(-50%);
        }

        .judge-hat::before { left: -10px; }
        .judge-hat::after { right: -10px; }

        .judge-face {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 26px;
            background: linear-gradient(145deg, #ffe8d6, #ffd4b8);
            border-radius: 15px;
        }

        .judge-eyes {
            position: absolute;
            top: 9px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 7px;
        }

        .eye {
            width: 5px;
            height: 2px;
            background: var(--text-main);
            border-radius: 50%;
        }

        .judge-beard {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 16px;
            background: linear-gradient(180deg, #2d2d2d, #1a1a1a);
            border-radius: 50% 50% 60% 60%;
        }

        .judge-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 38px;
            background: linear-gradient(145deg, #c41e3a, #9e1b32);
            border-radius: 20px 20px 18px 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="judge-mini">
                <div class="judge-hat"></div>
                <div class="judge-face">
                    <div class="judge-eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="judge-beard"></div>
                </div>
                <div class="judge-body"></div>
            </div>
            <h1>申论判官</h1>
            <p class="subtitle">填写信息，开始体验</p>
        </div>
        
        <div class="success-message" id="successMsg"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="nickname" placeholder="怎么称呼你？" required>
                <div class="error-message" id="nicknameError"></div>
            </div>
            
            <div class="form-group">
                <label>手机号码</label>
                <input type="tel" id="phone" placeholder="11 位手机号码" required pattern="[0-9]{11}" inputmode="tel">
                <div class="error-message" id="phoneError"></div>
            </div>
            
            <div class="form-group">
                <label>申论分数</label>
                <input type="text" id="score" placeholder="例如：75" required inputmode="numeric">
                <div class="error-message" id="scoreError"></div>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">开始体验</button>
        </form>
    </div>

    <script>
        const API_BASE = '/api';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const score = document.getElementById('score').value.trim();
            
            let valid = true;
            
            if (!nickname) {
                document.getElementById('nicknameError').textContent = '请输入昵称';
                document.getElementById('nicknameError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('nicknameError').style.display = 'none';
            }
            
            if (!phone || !/^[0-9]{11}$/.test(phone)) {
                document.getElementById('phoneError').textContent = '请输入正确的 11 位手机号码';
                document.getElementById('phoneError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('phoneError').style.display = 'none';
            }
            
            if (!score) {
                document.getElementById('scoreError').textContent = '请输入申论分数';
                document.getElementById('scoreError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('scoreError').style.display = 'none';
            }
            
            if (!valid) return;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, phone, score })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('shenlun_user_id', result.user_id);
                    localStorage.setItem('shenlun_user', JSON.stringify(result.user));
                    
                    document.getElementById('successMsg').textContent = '✓ 注册成功！即将跳转...';
                    document.getElementById('successMsg').style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    alert(result.message || '注册失败，请重试');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '开始体验';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络错误');
                submitBtn.disabled = false;
                submitBtn.textContent = '开始体验';
            }
        });
        
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('shenlun_user_id');
            if (userId) {
                // 已注册用户，直接跳转到主页开始评判
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>

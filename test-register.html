<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试注册页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #e07040;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>测试注册</h1>
    <div class="success" id="successMsg"></div>
    
    <form id="registerForm">
        <div class="form-group">
            <label>昵称</label>
            <input type="text" id="nickname" required>
            <div class="error" id="nicknameError"></div>
        </div>
        
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="phone" required pattern="[0-9]{11}">
            <div class="error" id="phoneError"></div>
        </div>
        
        <div class="form-group">
            <label>申论分数</label>
            <input type="text" id="score" required>
            <div class="error" id="scoreError"></div>
        </div>
        
        <button type="submit" id="submitBtn">注册</button>
    </form>
    
    <div style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px;">
        <h3>当前状态：</h3>
        <p>用户 ID: <span id="currentUserId">未登录</span></p>
        <button onclick="logout()" style="background: #6c757d; margin-top: 10px;">退出登录</button>
        <button onclick="location.href='/'" style="background: #28a745; margin-top: 10px;">去主页</button>
    </div>

    <script>
        const API_BASE = '/api';
        
        // 检查登录状态
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('shenlun_user_id');
            document.getElementById('currentUserId').textContent = userId || '未登录';
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const score = document.getElementById('score').value.trim();
            
            // 验证
            let valid = true;
            if (!nickname) {
                document.getElementById('nicknameError').textContent = '请输入昵称';
                valid = false;
            } else {
                document.getElementById('nicknameError').textContent = '';
            }
            
            if (!phone || !/^[0-9]{11}$/.test(phone)) {
                document.getElementById('phoneError').textContent = '请输入正确的 11 位手机号';
                valid = false;
            } else {
                document.getElementById('phoneError').textContent = '';
            }
            
            if (!score) {
                document.getElementById('scoreError').textContent = '请输入分数';
                valid = false;
            } else {
                document.getElementById('scoreError').textContent = '';
            }
            
            if (!valid) return;
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, phone, score })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('shenlun_user_id', result.user_id);
                    localStorage.setItem('shenlun_user', JSON.stringify(result.user));
                    
                    document.getElementById('successMsg').textContent = '✓ 注册成功！用户 ID: ' + result.user_id;
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('currentUserId').textContent = result.user_id;
                    
                    btn.disabled = false;
                    btn.textContent = '注册';
                } else {
                    alert(result.message || '注册失败');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络错误：' + error.message);
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
        
        function logout() {
            localStorage.removeItem('shenlun_user_id');
            localStorage.removeItem('shenlun_user');
            document.getElementById('currentUserId').textContent = '未登录';
            alert('已退出登录');
        }
    </script>
</body>
</html>
